kube-prometheus-stack:

  prometheus:
    prometheusSpec:
      scrapeInterval: "60s"        # default is 15s
      evaluationInterval: "60s"

      retention: 3d

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 300m
          memory: 512Mi

  grafana:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 128Mi

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi

  kubeStateMetrics:
    enabled: true  

  nodeExporter:
    enabled: true  

  defaultRules:
    create: true
    rules:
      etcd: false
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false

  prometheusOperator:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  kube-state-metrics:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi